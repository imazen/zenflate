[package]
name = "zenflate"
version = "0.1.0"
edition = "2024"
rust-version = "1.89"
description = "Pure Rust DEFLATE/zlib/gzip compression and decompression, ported from libdeflate"
license = "MIT"
repository = "https://github.com/imazen/zenflate"
categories = ["compression"]
keywords = ["deflate", "zlib", "gzip", "compression", "decompression"]

[features]
default = ["std", "avx512"]
std = ["alloc", "archmage/std"]
alloc = []
avx512 = ["archmage/avx512", "safe_unaligned_simd/avx512"]
unchecked = []

[dependencies]
archmage = { version = "0.8.1", default-features = false, features = ["macros", "safe_unaligned_simd"] }
safe_unaligned_simd = { version = "0.2", default-features = false }

[dev-dependencies]
criterion = { version = "0.5", default-features = false }
libdeflater = "1.25"
flate2 = "1"
miniz_oxide = "0.8"

[[bench]]
name = "throughput"
harness = false
