name: Miri

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.run_id }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always

jobs:
  miri:
    name: Miri (unsafe soundness)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install Rust nightly
        uses: dtolnay/rust-toolchain@nightly
        with:
          components: miri

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Miri tests (unchecked feature)
        run: |
          cargo miri test --features unchecked -- \
            --skip zeros --skip sequential --skip large \
            --skip all_levels --skip all_formats \
            --skip window_boundary --skip block_splitting \
            --skip parallel --skip compression_improves \
            --skip short_inputs --skip repetitive \
            --skip actually_compresses
